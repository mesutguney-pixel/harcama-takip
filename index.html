<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harcama Takip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2e;
    --accent-bank: #3b82f6;
    --accent-cash: #22c55e;
    --text: #f0f0f2;
    --muted: #6b6b78;
    --error: #ef4444;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
padding: 32px 20px;
}

.app { max-width: 820px; margin: 0 auto; }
header { margin-bottom: 40px; }

h1 {
font-family: ‘Syne’, sans-serif;
font-size: 2rem;
font-weight: 800;
letter-spacing: -0.04em;
line-height: 1;
margin-bottom: 6px;
}

.subtitle { font-size: 0.75rem; color: var(–muted); letter-spacing: 0.1em; }

.type-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }

.type-btn {
padding: 18px;
border: 1.5px solid var(–border);
background: var(–surface);
border-radius: 10px;
cursor: pointer;
transition: all 0.15s;
text-align: left;
}

.type-btn:hover { border-color: var(–muted); }
.type-btn.active.bank { border-color: var(–accent-bank); background: rgba(59,130,246,0.08); }
.type-btn.active.cash { border-color: var(–accent-cash); background: rgba(34,197,94,0.08); }

.type-label {
font-family: ‘Syne’, sans-serif;
font-size: 1.1rem;
font-weight: 700;
display: block;
margin-bottom: 3px;
}

.type-btn.active.bank .type-label { color: var(–accent-bank); }
.type-btn.active.cash .type-label { color: var(–accent-cash); }
.type-desc { font-size: 0.7rem; color: var(–muted); letter-spacing: 0.05em; }

.form-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 24px;
margin-bottom: 28px;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: 1 / -1; }

label { font-size: 0.65rem; letter-spacing: 0.12em; color: var(–muted); text-transform: uppercase; }

input, select {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 7px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.88rem;
padding: 10px 12px;
transition: border-color 0.15s;
outline: none;
width: 100%;
}

input:focus, select:focus { border-color: var(–muted); }
select option { background: #1e1e21; }

.amount-row { display: grid; grid-template-columns: 1fr 120px; gap: 8px; }
.dir-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.dir-btn {
padding: 10px;
border: 1px solid var(–border);
background: var(–surface2);
border-radius: 7px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 0.85rem;
cursor: pointer;
transition: all 0.15s;
}

.dir-btn:hover { color: var(–text); border-color: var(–muted); }
.dir-btn.active.income { background: rgba(34,197,94,0.12); border-color: var(–accent-cash); color: var(–accent-cash); }
.dir-btn.active.expense { background: rgba(239,68,68,0.12); border-color: var(–error); color: var(–error); }

.add-btn {
width: 100%;
padding: 13px;
background: var(–text);
color: var(–bg);
border: none;
border-radius: 8px;
font-family: ‘Syne’, sans-serif;
font-size: 0.95rem;
font-weight: 700;
cursor: pointer;
letter-spacing: 0.04em;
transition: opacity 0.15s;
margin-top: 6px;
}

.add-btn:hover { opacity: 0.85; }

.month-bar {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
gap: 12px;
flex-wrap: wrap;
}

.month-bar h2 { font-family: ‘Syne’, sans-serif; font-size: 1.1rem; font-weight: 700; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.month-select {
padding: 8px 12px;
font-size: 0.8rem;
border-radius: 7px;
background: var(–surface);
border: 1px solid var(–border);
color: var(–text);
font-family: ‘DM Mono’, monospace;
}

.copy-btn {
padding: 8px 16px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 7px;
color: var(–text);
font-family: ‘Syne’, sans-serif;
font-size: 0.8rem;
font-weight: 600;
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
}

.copy-btn:hover { border-color: var(–muted); }
.copy-btn.copied { border-color: var(–accent-cash); color: var(–accent-cash); background: rgba(34,197,94,0.08); }
.copy-bank { border-color: rgba(59,130,246,0.4); }
.copy-bank:hover { border-color: var(–accent-bank); color: var(–accent-bank); }
.copy-cash { border-color: rgba(34,197,94,0.4); }
.copy-cash:hover { border-color: var(–accent-cash); color: var(–accent-cash); }

.entries { display: flex; flex-direction: column; gap: 6px; }

.section-header { display: flex; align-items: center; gap: 10px; padding: 10px 0 6px; }

.section-title {
font-family: ‘Syne’, sans-serif;
font-size: 0.75rem;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
}

.section-title.bank { color: var(–accent-bank); }
.section-title.cash { color: var(–accent-cash); }
.section-line { flex: 1; height: 1px; background: var(–border); }

.entry {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px 14px;
display: grid;
grid-template-columns: 90px 1fr auto auto;
align-items: center;
gap: 12px;
transition: border-color 0.15s;
animation: slideIn 0.2s ease;
}

@keyframes slideIn {
from { opacity: 0; transform: translateY(-6px); }
to { opacity: 1; transform: translateY(0); }
}

.entry:hover { border-color: var(–muted); }
.entry-date { font-size: 0.75rem; color: var(–muted); }
.entry-desc { font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.entry-amount { font-size: 0.88rem; font-weight: 500; white-space: nowrap; text-align: right; }
.entry-amount.income { color: var(–accent-cash); }
.entry-amount.expense { color: var(–error); }
.entry-actions { display: flex; gap: 4px; }

.icon-btn {
background: none;
border: none;
cursor: pointer;
font-size: 1rem;
padding: 2px 5px;
border-radius: 4px;
transition: color 0.15s;
line-height: 1;
}

.icon-btn.edit { color: var(–muted); }
.icon-btn.edit:hover { color: var(–accent-bank); }
.icon-btn.del { color: var(–border); }
.icon-btn.del:hover { color: var(–error); }

.empty-state { text-align: center; padding: 40px; color: var(–muted); font-size: 0.8rem; letter-spacing: 0.06em; }

/* Modal */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.75);
z-index: 100;
align-items: center;
justify-content: center;
padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 28px;
width: 100%;
max-width: 480px;
}

.modal h3 {
font-family: ‘Syne’, sans-serif;
font-size: 1.1rem;
font-weight: 700;
margin-bottom: 20px;
}

.modal-actions { display: flex; gap: 8px; margin-top: 18px; }

.btn-save {
flex: 1;
padding: 11px;
background: var(–text);
color: var(–bg);
border: none;
border-radius: 8px;
font-family: ‘Syne’, sans-serif;
font-size: 0.9rem;
font-weight: 700;
cursor: pointer;
transition: opacity 0.15s;
}

.btn-save:hover { opacity: 0.85; }

.btn-cancel {
padding: 11px 20px;
background: transparent;
color: var(–muted);
border: 1px solid var(–border);
border-radius: 8px;
font-family: ‘Syne’, sans-serif;
font-size: 0.9rem;
font-weight: 600;
cursor: pointer;
transition: all 0.15s;
}

.btn-cancel:hover { color: var(–text); border-color: var(–muted); }

.toast {
position: fixed;
bottom: 24px;
right: 24px;
background: var(–surface2);
border: 1px solid var(–accent-cash);
color: var(–accent-cash);
padding: 10px 18px;
border-radius: 8px;
font-size: 0.8rem;
font-family: ‘Syne’, sans-serif;
font-weight: 600;
letter-spacing: 0.05em;
opacity: 0;
transform: translateY(10px);
transition: all 0.2s;
pointer-events: none;
z-index: 200;
}

.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 540px) {
.form-grid { grid-template-columns: 1fr; }
.entry { grid-template-columns: 70px 1fr auto auto; gap: 8px; }
.entry-desc { font-size: 0.75rem; }
}
</style>

</head>
<body>
<div class="app">
  <header>
    <h1>Harcama Takip</h1>
    <span class="subtitle">BANK &amp; CASH · AY SONU KOPYALA</span>
  </header>

  <div class="type-selector">
    <button class="type-btn bank active" onclick="setType('bank')">
      <span class="type-label">🏦 BANKA</span>
      <span class="type-desc">BANK ACCOUNT</span>
    </button>
    <button class="type-btn cash" onclick="setType('cash')">
      <span class="type-label">💵 CASH</span>
      <span class="type-desc">CASH ACCOUNT</span>
    </button>
  </div>

  <div class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>Tarih</label>
        <input type="date" id="entryDate">
      </div>
      <div class="field">
        <label>Yön</label>
        <div class="dir-row">
          <button class="dir-btn income active" id="incomeBtn" onclick="setDir('income')">▲ Gelir</button>
          <button class="dir-btn expense" id="expenseBtn" onclick="setDir('expense')">▼ Gider</button>
        </div>
      </div>
      <div class="field full">
        <label>Açıklama</label>
        <input type="text" id="entryDesc" placeholder="örn. meta advertisement payment">
      </div>
      <div class="field full">
        <label>Tutar</label>
        <div class="amount-row">
          <input type="number" id="entryAmount" placeholder="0.00" min="0" step="0.01">
          <select id="entryCurrency" onchange="toggleCustom('entryCurrency','customCurrencyField')">
            <option value="TL">TL</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="">— diğer —</option>
          </select>
        </div>
      </div>
      <div class="field full" id="customCurrencyField" style="display:none">
        <label>Para Birimi (manuel)</label>
        <input type="text" id="customCurrency" placeholder="örn. GBP">
      </div>
    </div>
    <button class="add-btn" onclick="addEntry()">+ EKLE</button>
  </div>

  <div class="month-bar">
    <h2>Kayıtlar</h2>
    <div class="controls">
      <select class="month-select" id="monthFilter" onchange="renderEntries()">
        <option value="all">Tüm aylar</option>
      </select>
      <button class="copy-btn copy-bank" id="copyBankBtn" onclick="copyData('bank')">📋 Bankayı Kopyala</button>
      <button class="copy-btn copy-cash" id="copyCashBtn" onclick="copyData('cash')">📋 Cash'i Kopyala</button>
    </div>
  </div>

  <div class="entries" id="entriesList"></div>
</div>

<!-- Edit Modal -->

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✎ Kaydı Düzenle</h3>
    <input type="hidden" id="editId">
    <div class="form-grid">
      <div class="field">
        <label>Tarih</label>
        <input type="date" id="editDate">
      </div>
      <div class="field">
        <label>Hesap</label>
        <select id="editType">
          <option value="bank">🏦 Banka</option>
          <option value="cash">💵 Cash</option>
        </select>
      </div>
      <div class="field full">
        <label>Yön</label>
        <select id="editDir">
          <option value="income">▲ Gelir</option>
          <option value="expense">▼ Gider</option>
        </select>
      </div>
      <div class="field full">
        <label>Açıklama</label>
        <input type="text" id="editDesc">
      </div>
      <div class="field full">
        <label>Tutar</label>
        <div class="amount-row">
          <input type="number" id="editAmount" min="0" step="0.01">
          <select id="editCurrency" onchange="toggleCustom('editCurrency','editCustomCurrencyField')">
            <option value="TL">TL</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="">— diğer —</option>
          </select>
        </div>
      </div>
      <div class="field full" id="editCustomCurrencyField" style="display:none">
        <label>Para Birimi (manuel)</label>
        <input type="text" id="editCustomCurrency" placeholder="örn. GBP">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">İptal</button>
      <button class="btn-save" onclick="saveEdit()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let entries = JSON.parse(localStorage.getItem('expense_entries') || '[]');
  let currentType = 'bank';
  let currentDir = 'income';

  document.getElementById('entryDate').value = new Date().toISOString().slice(0,10);

  function toggleCustom(selId, fieldId) {
    document.getElementById(fieldId).style.display =
      document.getElementById(selId).value === '' ? 'block' : 'none';
  }

  function setType(t) {
    currentType = t;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.type-btn.' + t).classList.add('active');
  }

  function setDir(d) {
    currentDir = d;
    document.getElementById('incomeBtn').className = 'dir-btn income' + (d === 'income' ? ' active' : '');
    document.getElementById('expenseBtn').className = 'dir-btn expense' + (d === 'expense' ? ' active' : '');
  }

  function getCurrency(selId, customId) {
    var v = document.getElementById(selId).value;
    return v === '' ? (document.getElementById(customId).value.trim() || '') : v;
  }

  function addEntry() {
    var date    = document.getElementById('entryDate').value;
    var desc    = document.getElementById('entryDesc').value.trim();
    var amount  = parseFloat(document.getElementById('entryAmount').value);
    var currency = getCurrency('entryCurrency', 'customCurrency');

    if (!date || !desc || isNaN(amount) || amount <= 0) {
      showToast('Lütfen tüm alanları doldurun.', true);
      return;
    }

    entries.push({ id: Date.now(), type: currentType, dir: currentDir, date: date, desc: desc, amount: amount, currency: currency });
    save();
    updateMonthFilter();
    renderEntries();
    document.getElementById('entryDesc').value = '';
    document.getElementById('entryAmount').value = '';
    showToast('Kayıt eklendi ✓');
  }

  function deleteEntry(id) {
    if (!confirm('Bu kaydı silmek istiyor musun?')) return;
    entries = entries.filter(function(e) { return e.id !== id; });
    save();
    updateMonthFilter();
    renderEntries();
  }

  function openEdit(id) {
    var e = entries.find(function(x) { return x.id === id; });
    if (!e) return;
    document.getElementById('editId').value = id;
    document.getElementById('editDate').value = e.date;
    document.getElementById('editDesc').value = e.desc;
    document.getElementById('editAmount').value = e.amount;
    document.getElementById('editDir').value = e.dir;
    document.getElementById('editType').value = e.type;
    var known = ['TL','USD','EUR'];
    if (known.indexOf(e.currency) !== -1) {
      document.getElementById('editCurrency').value = e.currency;
      document.getElementById('editCustomCurrencyField').style.display = 'none';
    } else {
      document.getElementById('editCurrency').value = '';
      document.getElementById('editCustomCurrency').value = e.currency || '';
      document.getElementById('editCustomCurrencyField').style.display = 'block';
    }
    document.getElementById('editModal').classList.add('open');
  }

  function closeEdit() {
    document.getElementById('editModal').classList.remove('open');
  }

  function saveEdit() {
    var id  = parseInt(document.getElementById('editId').value);
    var idx = entries.findIndex(function(x) { return x.id === id; });
    if (idx === -1) return;
    var amount = parseFloat(document.getElementById('editAmount').value);
    if (!amount || amount <= 0) { showToast('Geçerli bir tutar girin.', true); return; }
    var currency = getCurrency('editCurrency', 'editCustomCurrency');
    entries[idx] = Object.assign({}, entries[idx], {
      date:     document.getElementById('editDate').value,
      desc:     document.getElementById('editDesc').value.trim(),
      amount:   amount,
      currency: currency,
      dir:      document.getElementById('editDir').value,
      type:     document.getElementById('editType').value
    });
    save();
    updateMonthFilter();
    renderEntries();
    closeEdit();
    showToast('Kayıt güncellendi ✓');
  }

  document.getElementById('editModal').addEventListener('click', function(ev) {
    if (ev.target === this) closeEdit();
  });

  function save() {
    localStorage.setItem('expense_entries', JSON.stringify(entries));
  }

  function getSelectedMonth() {
    return document.getElementById('monthFilter').value;
  }

  function filterByMonth(list, month) {
    if (month === 'all') return list;
    return list.filter(function(e) { return e.date.slice(0,7) === month; });
  }

  function updateMonthFilter() {
    var months = [];
    entries.forEach(function(e) {
      var m = e.date.slice(0,7);
      if (months.indexOf(m) === -1) months.push(m);
    });
    months.sort().reverse();

    var sel     = document.getElementById('monthFilter');
    var current = sel.value;
    sel.innerHTML = '<option value="all">Tüm aylar</option>';
    months.forEach(function(m) {
      var parts = m.split('-');
      var label = new Date(parts[0], parts[1]-1).toLocaleString('tr-TR', {month:'long', year:'numeric'});
      var opt   = document.createElement('option');
      opt.value = m;
      opt.textContent = label;
      if (m === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function renderEntries() {
    var month    = getSelectedMonth();
    var filtered = filterByMonth(entries, month).sort(function(a,b) { return a.date.localeCompare(b.date); });
    var bank     = filtered.filter(function(e) { return e.type === 'bank'; });
    var cash     = filtered.filter(function(e) { return e.type === 'cash'; });
    var container = document.getElementById('entriesList');
    container.innerHTML = '';

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">— henüz kayıt yok —</div>';
      return;
    }

    if (bank.length > 0) {
      var sh = document.createElement('div');
      sh.className = 'section-header';
      sh.innerHTML = '<span class="section-title bank">🏦 Banka (' + bank.length + ')</span><div class="section-line"></div>';
      container.appendChild(sh);
      bank.forEach(function(e) { container.appendChild(entryEl(e)); });
    }

    if (cash.length > 0) {
      var sh2 = document.createElement('div');
      sh2.className = 'section-header';
      sh2.innerHTML = '<span class="section-title cash">💵 Cash (' + cash.length + ')</span><div class="section-line"></div>';
      container.appendChild(sh2);
      cash.forEach(function(e) { container.appendChild(entryEl(e)); });
    }
  }

  function entryEl(e) {
    var div = document.createElement('div');
    div.className = 'entry';
    var amtStr = (e.dir === 'income' ? '+' : '-') + formatNum(e.amount) + (e.currency ? ' ' + e.currency : '');
    div.innerHTML =
      '<span class="entry-date">' + formatDate(e.date) + '</span>' +
      '<span class="entry-desc" title="' + esc(e.desc) + '">' + esc(e.desc) + '</span>' +
      '<span class="entry-amount ' + e.dir + '">' + amtStr + '</span>' +
      '<div class="entry-actions">' +
        '<button class="icon-btn edit" onclick="openEdit(' + e.id + ')" title="Düzenle">✎</button>' +
        '<button class="icon-btn del"  onclick="deleteEntry(' + e.id + ')" title="Sil">×</button>' +
      '</div>';
    return div;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(d) {
    var p = d.split('-');
    return p[2] + '.' + p[1] + '.' + p[0];
  }

  function formatNum(n) {
    return n.toLocaleString('tr-TR', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function copyData(type) {
    var month    = getSelectedMonth();
    var filtered = filterByMonth(entries, month)
      .filter(function(e) { return e.type === type; })
      .sort(function(a,b) { return a.date.localeCompare(b.date); });

    if (filtered.length === 0) {
      showToast('Bu ay için ' + (type === 'bank' ? 'banka' : 'cash') + ' kaydı yok.', true);
      return;
    }

    // SADECE veri satırları — başlık satırı YOK
    var rows = filtered.map(function(e) {
      var p       = e.date.split('-');
      var dateStr = p[2] + '.' + p[1] + '.' + p[0];
      var descStr = e.currency ? e.desc + ' (' + e.currency + ')' : e.desc;
      var income  = e.dir === 'income'  ? String(e.amount) : '';
      var expense = e.dir === 'expense' ? String(e.amount) : '';
      return dateStr + '\t' + descStr + '\t' + income + '\t' + expense;
    });

    var text = rows.join('\n');

    function doCopy() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(doCopy);
    } else {
      doCopy();
    }

    var btnId    = type === 'bank' ? 'copyBankBtn' : 'copyCashBtn';
    var btnLabel = type === 'bank' ? '📋 Bankayı Kopyala' : "📋 Cash'i Kopyala";
    var btn      = document.getElementById(btnId);
    btn.classList.add('copied');
    btn.textContent = '✓ Kopyalandı!';
    setTimeout(function() { btn.classList.remove('copied'); btn.textContent = btnLabel; }, 2000);
    showToast(filtered.length + " satır kopyalandı — Excel'e yapıştır ✓");
  }

  function showToast(msg, isError) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = isError ? 'var(--error)' : 'var(--accent-cash)';
    t.style.color       = isError ? 'var(--error)' : 'var(--accent-cash)';
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2800);
  }

  updateMonthFilter();
  renderEntries();
</script>

</body>
</html>
